<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ 战术词汇指挥部 | TACTICAL WORD COMMAND</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap');

  :root {
    --bg-deep: #0d1110;
    --bg-panel: #141c16;
    --green-dark: #1a2e1a;
    --green-mid: #2d4a2d;
    --green-field: #3e5c3a;
    --olive: #5a6340;
    --khaki: #8b7d5e;
    --brass: #c4943a;
    --brass-light: #d4a84b;
    --red-tac: #c0392b;
    --text-primary: #d4d9c7;
    --text-secondary: #8a9580;
    --text-bright: #e8eddf;
    --border-tac: #2e3d2e;
    --glow-green: rgba(75, 140, 60, 0.5);
    --glow-brass: rgba(196, 148, 58, 0.4);
    --font-tactical: 'Rajdhani', 'Share Tech Mono', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg-deep);
    min-height: 100vh;
    position: relative;
    font-family: system-ui, -apple-system, sans-serif;
    overflow-x: hidden;
  }

  /* 迷彩纹理背景 */
  body::before {
    content: '';
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background:
      radial-gradient(ellipse at 10% 20%, rgba(45,74,45,0.25) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 60%, rgba(58,80,45,0.2) 0%, transparent 45%),
      radial-gradient(ellipse at 40% 85%, rgba(35,55,30,0.3) 0%, transparent 50%),
      radial-gradient(circle at 60% 15%, rgba(45,65,35,0.15) 0%, transparent 40%),
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 4px,
        rgba(255,255,255,0.008) 4px,
        rgba(255,255,255,0.008) 8px
      ),
      repeating-linear-gradient(
        -35deg,
        transparent,
        transparent 6px,
        rgba(0,0,0,0.04) 6px,
        rgba(0,0,0,0.04) 12px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* 扫描线效果 */
  body::after {
    content: '';
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .app-container {
    max-width: 1440px;
    margin: 0 auto;
    padding: 12px 20px 20px;
    position: relative;
    z-index: 1;
  }

  /* === 顶部横幅 === */
  .top-banner {
    background: linear-gradient(180deg, rgba(20,28,22,0.98) 0%, rgba(25,36,25,0.95) 100%);
    border: 2px solid var(--border-tac);
    border-image: linear-gradient(135deg, var(--green-mid), var(--olive), var(--green-mid)) 1;
    padding: 14px 28px;
    margin-bottom: 18px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    position: relative;
    clip-path: polygon(
      0 0, calc(100% - 30px) 0, 100% 30px, 100% 100%,
      30px 100%, 0 calc(100% - 30px)
    );
  }

  .top-banner::before {
    content: '';
    position: absolute;
    top: 2px; left: 2px; right: 2px; bottom: 2px;
    border: 1px solid rgba(90,99,64,0.2);
    clip-path: inherit;
    pointer-events: none;
  }

  .rank-badge {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .rank-stars {
    font-size: 1.4rem;
    letter-spacing: -3px;
    color: var(--brass);
    filter: drop-shadow(0 0 6px var(--glow-brass));
  }

  .unit-title h1 {
    font-family: var(--font-tactical);
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(100,160,80,0.3);
  }

  .unit-title .subtitle {
    font-family: var(--font-tactical);
    font-size: 0.7rem;
    color: var(--text-secondary);
    letter-spacing: 6px;
    margin-top: 2px;
  }

  .tactical-time {
    font-family: var(--font-tactical);
    font-size: 0.95rem;
    color: var(--brass-light);
    background: rgba(0,0,0,0.4);
    padding: 6px 16px;
    border: 1px solid var(--border-tac);
    letter-spacing: 3px;
  }

  /* === 模式切换 === */
  .ops-mode-bar {
    background: linear-gradient(180deg, rgba(22,28,20,0.95), rgba(28,36,24,0.9));
    border: 1px solid var(--border-tac);
    padding: 10px 20px;
    margin-bottom: 18px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px;
    position: relative;
  }

  .mode-label {
    font-family: var(--font-tactical);
    color: var(--text-secondary);
    letter-spacing: 4px;
    font-size: 0.75rem;
    text-transform: uppercase;
    margin-right: 8px;
  }

  .mode-btn {
    font-family: var(--font-tactical);
    border: 1px solid var(--border-tac);
    background: rgba(20,30,20,0.8);
    color: var(--text-secondary);
    padding: 9px 24px;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    text-transform: uppercase;
  }

  .mode-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 12px; right: 12px;
    height: 2px;
    background: transparent;
    transition: background 0.3s;
  }

  .mode-btn:hover {
    border-color: var(--olive);
    color: var(--text-bright);
    background: rgba(45,55,35,0.6);
  }

  .mode-btn.active {
    background: linear-gradient(180deg, var(--green-mid), var(--green-dark));
    color: var(--brass-light);
    border-color: var(--green-field);
    box-shadow: 0 0 20px var(--glow-green), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .mode-btn.active::after {
    background: var(--brass);
  }

  .ammo-indicator {
    margin-left: auto;
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .ammo-dot {
    width: 6px; height: 6px;
    background: var(--brass-light);
    border-radius: 0;
    animation: ammoPulse 2s infinite;
  }

  .ammo-dot:nth-child(2) { animation-delay: 0.3s; }
  .ammo-dot:nth-child(3) { animation-delay: 0.6s; }

  @keyframes ammoPulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* === 主布局 === */
  .main-layout {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }

  /* === 侧边栏 === */
  .intel-sidebar {
    flex: 0 0 240px;
    min-width: 220px;
    background: linear-gradient(180deg, rgba(18,26,18,0.98), rgba(22,32,20,0.95));
    border: 1px solid var(--border-tac);
    padding: 18px 10px;
    max-height: 70vh;
    overflow-y: auto;
    position: relative;
  }

  .intel-sidebar::before {
    content: 'INTEL BRIEF';
    display: block;
    font-family: var(--font-tactical);
    font-size: 0.6rem;
    color: var(--text-secondary);
    letter-spacing: 6px;
    text-align: center;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border-tac);
    margin-bottom: 14px;
  }

  .intel-sidebar h3 {
    font-family: var(--font-tactical);
    font-size: 0.9rem;
    color: var(--brass-light);
    letter-spacing: 3px;
    margin-bottom: 14px;
    padding-left: 12px;
    border-left: 3px solid var(--green-field);
    text-transform: uppercase;
  }

  .cat-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .cat-item {
    background: rgba(15,25,15,0.7);
    border: 1px solid rgba(46,61,46,0.6);
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-tactical);
    font-size: 0.8rem;
    color: var(--text-secondary);
    letter-spacing: 2px;
    transition: all 0.25s;
    position: relative;
  }

  .cat-item .count-badge {
    background: rgba(0,0,0,0.5);
    padding: 2px 8px;
    font-size: 0.65rem;
    border: 1px solid var(--border-tac);
    color: var(--text-secondary);
  }

  .cat-item:hover {
    border-color: var(--olive);
    color: var(--text-bright);
    background: rgba(40,55,35,0.7);
    transform: translateX(3px);
  }

  .cat-item.active {
    background: var(--green-dark);
    border-color: var(--green-field);
    color: var(--brass-light);
    box-shadow: 0 0 15px var(--glow-green);
  }

  .cat-item.active::before {
    content: '▶';
    position: absolute;
    left: -10px;
    color: var(--brass);
    font-size: 0.5rem;
  }

  .cat-item.active .count-badge {
    border-color: var(--green-field);
    color: var(--brass-light);
  }

  /* === 内容区 === */
  .content-area {
    flex: 1;
    min-width: 300px;
  }

  /* === 单词卡片网格 === */
  .word-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    max-height: 64vh;
    overflow-y: auto;
    padding: 4px;
  }

  .word-card {
    background: linear-gradient(180deg, rgba(22,32,20,0.95), rgba(18,26,16,0.98));
    border: 1px solid var(--border-tac);
    padding: 18px 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    clip-path: polygon(
      6px 0, 100% 0, 100% calc(100% - 6px),
      calc(100% - 6px) 100%, 0 100%, 0 6px
    );
  }

  .word-card::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 50% 50%, rgba(75,140,60,0.06) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .word-card:hover {
    transform: translateY(-5px);
    border-color: var(--green-field);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 20px var(--glow-green);
  }

  .word-card:hover::before {
    opacity: 1;
  }

  .word-card .tac-code {
    font-family: var(--font-tactical);
    font-size: 0.55rem;
    color: var(--text-secondary);
    letter-spacing: 4px;
    margin-bottom: 8px;
    opacity: 0.5;
  }

  .word-card .en {
    font-family: var(--font-tactical);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(200,220,180,0.2);
  }

  .word-card .zh {
    margin-top: 10px;
    color: var(--brass-light);
    font-size: 0.85rem;
    font-weight: 500;
    border-top: 1px solid rgba(46,61,46,0.5);
    padding-top: 8px;
    letter-spacing: 2px;
  }

  .word-card .comms {
    margin-top: 8px;
    font-size: 0.8rem;
    color: var(--text-secondary);
    opacity: 0.6;
  }

  /* === 挑战面板 === */
  .ops-panel {
    background: linear-gradient(180deg, rgba(20,30,20,0.97), rgba(16,24,16,0.98));
    border: 1px solid var(--border-tac);
    padding: 24px;
    position: relative;
  }

  .ops-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green-field), transparent);
  }

  .level-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .level-btn {
    font-family: var(--font-tactical);
    background: rgba(20,30,20,0.8);
    border: 1px solid var(--border-tac);
    color: var(--text-secondary);
    padding: 12px 22px;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
  }

  .level-btn:hover {
    border-color: var(--olive);
    color: var(--text-bright);
    background: rgba(40,55,35,0.6);
  }

  .level-btn.active-level {
    background: var(--green-mid);
    color: var(--brass-light);
    border-color: var(--green-field);
    box-shadow: 0 0 20px var(--glow-green);
    text-shadow: 0 0 10px rgba(196,148,58,0.4);
  }

  .mission-board {
    background: rgba(15,22,15,0.8);
    border: 1px solid var(--border-tac);
    padding: 28px 20px;
    text-align: center;
  }

  .mission-title {
    font-family: var(--font-tactical);
    font-size: 0.65rem;
    color: var(--text-secondary);
    letter-spacing: 8px;
    margin-bottom: 16px;
  }

  .question-text {
    font-family: var(--font-tactical);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-bright);
    display: inline-block;
    padding: 14px 28px;
    background: rgba(30,45,28,0.8);
    border: 1px solid var(--border-tac);
    margin: 14px 0;
    letter-spacing: 2px;
  }

  .question-text em {
    color: var(--brass-light);
    font-style: normal;
  }

  .options-area {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    margin: 20px 0;
  }

  .option-btn {
    font-family: var(--font-tactical);
    background: rgba(18,28,18,0.9);
    border: 1px solid var(--border-tac);
    color: var(--text-primary);
    padding: 10px 24px;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .option-btn:hover {
    border-color: var(--green-field);
    background: rgba(40,55,35,0.7);
    color: var(--text-bright);
    box-shadow: 0 0 15px var(--glow-green);
  }

  .option-btn:active {
    transform: scale(0.96);
  }

  .input-area {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin: 20px auto;
  }

  .answer-input {
    font-family: var(--font-tactical);
    padding: 12px 20px;
    font-size: 1rem;
    border: 1px solid var(--border-tac);
    background: rgba(10,18,10,0.9);
    color: var(--text-bright);
    width: 260px;
    text-align: center;
    outline: none;
    letter-spacing: 2px;
    transition: border-color 0.3s;
  }

  .answer-input:focus {
    border-color: var(--green-field);
    box-shadow: 0 0 15px var(--glow-green);
  }

  .answer-input::placeholder {
    color: rgba(138,149,128,0.4);
  }

  .action-btn {
    font-family: var(--font-tactical);
    background: var(--green-mid);
    border: 1px solid var(--green-field);
    color: var(--text-bright);
    padding: 10px 28px;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }

  .action-btn:hover {
    background: var(--green-field);
    border-color: var(--olive);
    box-shadow: 0 0 20px var(--glow-green);
  }

  .action-btn:active {
    transform: scale(0.96);
  }

  .action-btn.record-btn {
    background: var(--red-tac);
    border-color: #a93226;
  }

  .action-btn.record-btn:hover {
    box-shadow: 0 0 20px rgba(192,57,43,0.5);
  }

  .feedback {
    font-family: var(--font-tactical);
    font-size: 1rem;
    margin: 14px 0;
    min-height: 55px;
    letter-spacing: 2px;
    color: var(--text-bright);
  }

  .score-area {
    background: rgba(20,30,15,0.8);
    border: 1px solid var(--border-tac);
    padding: 4px 16px;
    font-family: var(--font-tactical);
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--brass-light);
  }

  .score-area.warning {
    border-color: var(--red-tac);
    color: #e74c3c;
  }

  /* === 结果页 === */
  .mission-complete {
    text-align: center;
    padding: 40px 20px;
  }

  .mission-complete .rank-icon {
    font-size: 4rem;
    margin-bottom: 16px;
  }

  .mission-complete h2 {
    font-family: var(--font-tactical);
    font-size: 1.6rem;
    color: var(--brass-light);
    letter-spacing: 4px;
    margin-bottom: 12px;
  }

  .mission-complete .score-display {
    font-family: var(--font-tactical);
    font-size: 2rem;
    color: var(--text-bright);
    letter-spacing: 4px;
    margin-bottom: 20px;
  }

  /* === 页脚 === */
  footer {
    text-align: center;
    margin-top: 24px;
    padding: 12px;
    font-family: var(--font-tactical);
    font-size: 0.6rem;
    color: var(--text-secondary);
    letter-spacing: 4px;
    border-top: 1px solid var(--border-tac);
    position: relative;
    z-index: 1;
  }

  /* === 滚动条 === */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb {
    background: var(--green-dark);
    border: 1px solid var(--border-tac);
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--green-mid); }

  /* === 响应式 === */
  @media (max-width: 768px) {
    .main-layout { flex-direction: column; }
    .intel-sidebar { flex: auto; max-height: 30vh; min-width: auto; }
    .top-banner { clip-path: none; padding: 12px 16px; }
    .unit-title h1 { font-size: 1.3rem; letter-spacing: 2px; }
    .word-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
</style>
</head>
<body>
<div class="app-container">
  <!-- 顶部横幅 -->
  <div class="top-banner">
    <div class="rank-badge">
      <span class="rank-stars">✪✪✪</span>
      <div class="unit-title">
        <h1>TACTICAL WORD COMMAND</h1>
        <div class="subtitle">⚔ 战术词汇指挥部 · 五级作战训练系统</div>
      </div>
    </div>
    <div class="tactical-time" id="tacClock">COMSTAT 0000 ZULU</div>
  </div>

  <!-- 模式切换栏 -->
  <div class="ops-mode-bar">
    <span class="mode-label">▸ OP MODE</span>
    <button class="mode-btn active" data-mode="browse">📋 情报阅览</button>
    <button class="mode-btn" data-mode="challenge">🎯 作战任务</button>
    <div class="ammo-indicator">
      <span style="font-family:var(--font-tactical);color:var(--text-secondary);font-size:0.6rem;letter-spacing:2px;">SYS-OK</span>
      <span class="ammo-dot"></span>
      <span class="ammo-dot"></span>
      <span class="ammo-dot"></span>
    </div>
  </div>

  <!-- 主体 -->
  <div class="main-layout">
    <div class="intel-sidebar">
      <h3>📡 情报分类</h3>
      <div id="categoryList" class="cat-list">载入情报中...</div>
    </div>
    <div class="content-area">
      <div id="dynamicContent"></div>
    </div>
  </div>

  <footer>
    ⚡ TACTICAL WORD COMMAND v2.0 — CLASSIFIED TRAINING SYSTEM — STAND BY ⚡
  </footer>
</div>

<script>

// 获取当前分类单词
function getWordsByCategory(limit = 30) {
    let filtered = uniqueBank.filter(w => w.category === currentCategory);
    if (filtered.length === 0) filtered = uniqueBank.slice(0, 30);
    let shuffled = [...filtered];
    for (let i = shuffled.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled.slice(0, limit);
}

// 短语生成
function generatePhrase(wordObj) {
    const w = wordObj.word;
    const meaning = wordObj.meaning;
    const commonPhrases = {
        "apple": ["fresh apple", "新鲜的苹果"], "cat": ["black cat", "黑猫"], "dog": ["guard dog", "警卫犬"],
        "car": ["red car", "红色汽车"], "teacher": ["head teacher", "主任教官"], "friend": ["best friend", "最佳战友"],
        "mother": ["kind mother", "慈祥的母亲"], "father": ["brave father", "勇敢的父亲"],
        "school": ["training camp", "训练营"], "bird": ["scout bird", "侦察鸟"]
    };
    if (commonPhrases[w]) return { en: commonPhrases[w][0], zh: commonPhrases[w][1] };
    let adj = "tactical", adjZh = "战术的";
    if (meaning.includes("红")) { adj = "red"; adjZh = "红色的"; }
    else if (meaning.includes("蓝")) { adj = "blue"; adjZh = "蓝色的"; }
    else if (meaning.includes("大")) { adj = "heavy"; adjZh = "重型"; }
    else if (meaning.includes("快")) { adj = "rapid"; adjZh = "快速的"; }
    return { en: `${adj} ${w}`, zh: `${adjZh}${meaning}` };
}

// 句子生成
function generateSentence(wordObj) {
    const w = wordObj.word;
    const meaning = wordObj.meaning;
    const templates = [
        { en: `Deploy the ${w} now.`, zh: `立即部署${meaning}。` },
        { en: `The ${w} is operational.`, zh: `${meaning}已进入作战状态。` },
        { en: `Report on the ${w}.`, zh: `汇报${meaning}情况。` },
        { en: `Secure the ${w}, soldier.`, zh: `保护${meaning}，士兵。` }
    ];
    return templates[Math.floor(Math.random() * templates.length)];
}

// 构建挑战题目
function buildChallengeQuestions(level, limit = 5) {
    const wordPool = getWordsByCategory(20);
    if (wordPool.length < 3) return [];
    const shuffled = [...wordPool];
    for (let i = shuffled.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    const selected = [];
    for (let i = 0; i < Math.min(limit, shuffled.length); i++) {
        const wObj = shuffled[i];
        if (level === 1) {
            let opts = [wObj.word];
            let others = uniqueBank.filter(ow => ow.word !== wObj.word && ow.category !== wObj.category).slice(0, 3);
            if (others.length < 3) others = uniqueBank.filter(ow => ow.word !== wObj.word).slice(0, 3);
            let optWords = opts.concat(others.map(o => o.word));
            optWords.sort(() => Math.random() - 0.5);
            selected.push({ type: 1, wordObj: wObj, questionText: wObj.meaning, options: optWords, correctAnswer: wObj.word });
        } else if (level === 2) {
            selected.push({ type: 2, wordObj: wObj, correctAnswer: wObj.word.toLowerCase() });
        } else if (level === 3) {
            selected.push({ type: 3, wordObj: wObj, targetWord: wObj.word });
        } else if (level === 4) {
            const phrase = generatePhrase(wObj);
            let wrongs = ["美丽的风景", "快速的车辆", "重型装备", "隐蔽行动"];
            let options = [phrase.zh, ...wrongs.slice(0, 2)];
            options = options.slice(0, 3);
            if (!options.includes(phrase.zh)) options[0] = phrase.zh;
            options.sort(() => Math.random() - 0.5);
            selected.push({ type: 4, wordObj: wObj, questionText: phrase.en, options: options, correctAnswer: phrase.zh });
        } else if (level === 5) {
            const sentence = generateSentence(wObj);
            let wrongs = ["这是好的", "我喜欢它", "看那边", "他很好"];
            let options = [sentence.zh, ...wrongs.slice(0, 2)];
            options = options.slice(0, 3);
            if (!options.includes(sentence.zh)) options[0] = sentence.zh;
            options.sort(() => Math.random() - 0.5);
            selected.push({ type: 5, wordObj: wObj, questionText: sentence.en, options: options, correctAnswer: sentence.zh });
        }
    }
    return selected;
}

    const questions = buildChallengeQuestions(level, 5);
    if (questions.length === 0) {
        document.getElementById("dynamicContent").innerHTML = `<div class="ops-panel"><div class="mission-board"><p style="font-family:var(--font-tactical);color:var(--text-secondary);letter-spacing:2px;">⚠ 情报不足，切换目标分类</p></div></div>`;

    challengeState = {
        questions: questions,
        currentIndex: 0,
        score: 0,
        answered: false,
        total: questions.length,
        level: level
    };
    renderChallengeQuestion();
}

                else { fb.innerHTML = `❌ 偏离目标！正确: ${q.correctAnswer}`; fb.style.color = '#e74c3c'; }
                challengeState.answered = true;
                opts.forEach(b => { b.style.pointerEvents = "none"; b.style.opacity = "0.5"; });
            });
        });
    } else if (q.type === 2) {
        const playBtn = document.getElementById("playAudioBtn");
        if (playBtn) playBtn.onclick = () => { const utter = new SpeechSynthesisUtterance(q.wordObj.word); utter.lang = 'en-US'; speechSynthesis.cancel(); speechSynthesis.speak(utter); };
        const submitBtn = document.getElementById("submitSpellBtn");
        submitBtn.onclick = () => {
            if (challengeState.answered) return;
            const inputVal = document.getElementById("spellInput").value.trim().toLowerCase();
            const correct = q.correctAnswer.toLowerCase();
            const fb = document.getElementById("feedbackMsg");
            if (inputVal === correct) { challengeState.score++; fb.innerHTML = "🎉 破译成功！战绩 +1"; fb.style.color = '#7ec87e'; }
            else { fb.innerHTML = `❌ 破译失败，正确信号: ${correct}`; fb.style.color = '#e74c3c'; }
            challengeState.answered = true;
            submitBtn.disabled = true;
        };
    } else if (q.type === 3) {
        const recordBtn = document.getElementById("recordBtn");
        const statusDiv = document.getElementById("recordStatus");
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recordBtn.onclick = () => {
                if (challengeState.answered) { statusDiv.innerText = "本任务已完成，进入下一任务"; return; }
                statusDiv.innerText = "🎙 侦察中... 说出目标单词";
                recognition.start();
            };
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.trim().toLowerCase();
                const target = q.targetWord.toLowerCase();
                statusDiv.innerText = `信号识别: "${transcript}"`;
                let scorePercent = 0;
                if (transcript === target) scorePercent = 100;
                else if (transcript.includes(target) || target.includes(transcript)) scorePercent = 70;
                else if (Math.abs(transcript.length - target.length) <= 2) scorePercent = 50;
                else scorePercent = 20;
                const earned = Math.floor(scorePercent / 20);
                if (earned > 0) challengeState.score += earned;
                const fb = document.getElementById("feedbackMsg");
                fb.innerHTML = `🏅 侦察得分: ${scorePercent}分 获得 ${earned} 战绩积分！`;
                fb.style.color = scorePercent >= 70 ? '#7ec87e' : '#e74c3c';
                challengeState.answered = true;
                recordBtn.disabled = true;
            };
            recognition.onerror = () => { statusDiv.innerText = "侦察失败，检查通讯设备"; };
        } else {
            statusDiv.innerText = "设备不支持语音侦察 — 模拟模式";
            recordBtn.onclick = () => {
                if (challengeState.answered) return;
                challengeState.score += 1;
                document.getElementById("feedbackMsg").innerHTML = "🎤 模拟侦察 +1战绩";
                document.getElementById("feedbackMsg").style.color = '#7ec87e';
                challengeState.answered = true;
            };
        }
    }

    const nextBtn = document.getElementById("nextQBtn");
    nextBtn.onclick = () => {
        if (!challengeState.answered) { const fb = document.getElementById("feedbackMsg"); fb.innerHTML = "⚠ 请先完成当前任务！"; fb.style.color = '#f39c12'; return; }
        challengeState.currentIndex++;
        challengeState.answered = false;
        renderChallengeQuestion();
    };
    const resetBtn = document.getElementById("resetChallengeBtn");
    if (resetBtn) resetBtn.onclick = () => initChallenge(challengeState.level);
}

function renderChallengeModeSelector() {
    const levelHtml = `<div class="ops-panel">
        <div class="mission-board">
            <h2 style="font-family:var(--font-tactical);color:var(--brass-light);letter-spacing:4px;font-size:1.3rem;">⚡ 选择作战任务 ⚡</h2>
            <div class="mission-title" style="margin:12px 0;">MISSION SELECT</div>
            <div class="level-buttons">
                <button class="level-btn" data-lvl="1">1⃣ 新兵训练 · 汉译英</button>
                <button class="level-btn" data-lvl="2">2⃣ 通讯破译 · 听写</button>
                <button class="level-btn" data-lvl="3">3⃣ 语音侦察 · 发音</button>
                <button class="level-btn" data-lvl="4">4⃣ 密码翻译 · 短语</button>
                <button class="level-btn" data-lvl="5">5⃣ 战术指令 · 句子</button>
            </div>
            <p style="font-family:var(--font-tactical);font-size:0.8rem;color:var(--text-secondary);letter-spacing:2px;margin-top:16px;">📡 当前情报: ${currentCategory} | 所有任务均使用真实情报数据</p>
        </div>
    </div>`;
    document.getElementById("dynamicContent").innerHTML = levelHtml;
    document.querySelectorAll(".level-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
            const lvl = parseInt(btn.dataset.lvl);
            initChallenge(lvl);
        });
    });
}

// 单词卡片模式（情报阅览）
function renderBrowseMode() {
    const words = uniqueBank.filter(w => w.category === currentCategory);
    if (words.length === 0) {
        document.getElementById("dynamicContent").innerHTML = '<div class="ops-panel"><div class="mission-board"><p style="font-family:var(--font-tactical);color:var(--text-secondary);letter-spacing:2px;">情报为空</p></div></div>';
        return;
    }
    let cardHtml = `<div class="word-grid">`;
    words.forEach((w, idx) => {
        cardHtml += `<div class="word-card" data-word="${w.word}">
                        <div class="tac-code">INTEL-${String(idx+1).padStart(3,'0')}</div>
                        <div class="en">${w.word}</div>
                        <div class="zh">${w.meaning}</div>
                        <div class="comms">📡 点击通讯</div>
                    </div>`;
    });
    cardHtml += `</div>`;
    document.getElementById("dynamicContent").innerHTML = cardHtml;
    document.querySelectorAll(".word-card").forEach(card => {
        card.addEventListener("click", (e) => {
            const word = card.dataset.word;
            if (word && window.speechSynthesis) {
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = "en-US";
                utterance.rate = 0.75;
                speechSynthesis.cancel();
                speechSynthesis.speak(utterance);
            }
        });
    });
}

// 分类侧栏渲染
function renderCategories() {
    const catNames = Object.keys(categoriesData);
    const container = document.getElementById("categoryList");
    container.innerHTML = catNames.map(cat => `
        <div class="cat-item ${currentCategory === cat ? 'active' : ''}" data-cat="${cat}">
            <span>${cat}</span>
            <span class="count-badge">${categoriesData[cat].length}</span>
        </div>`).join("");
    document.querySelectorAll(".cat-item").forEach(el => {
        el.addEventListener("click", () => {
            currentCategory = el.dataset.cat;
            renderCategories();
            if (currentMode === "browse") renderBrowseMode();
            else if (currentMode === "challenge") renderChallengeModeSelector();
        });
    });
}

function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll(".mode-btn").forEach(btn => {
        if (btn.dataset.mode === mode) btn.classList.add("active");
        else btn.classList.remove("active");
    });
    if (mode === "browse") renderBrowseMode();
    else if (mode === "challenge") renderChallengeModeSelector();
}

// 启动
renderCategories();
renderBrowseMode();
document.querySelectorAll(".mode-btn").forEach(btn => {
    btn.addEventListener("click", () => switchMode(btn.dataset.mode));
});

// 键盘快捷键
document.addEventListener('keydown', (e) => {
    if (e.key === '1' && currentMode === 'challenge' && !challengeState) initChallenge(1);
    if (e.key === '2' && currentMode === 'challenge' && !challengeState) initChallenge(2);
    if (e.key === '3' && currentMode === 'challenge' && !challengeState) initChallenge(3);
    if (e.key === '4' && currentMode === 'challenge' && !challengeState) initChallenge(4);
    if (e.key === '5' && currentMode === 'challenge' && !challengeState) initChallenge(5);
    if (e.key === 'b') switchMode('browse');
    if (e.key === 'c') switchMode('challenge');
});
</script>
